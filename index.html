<!DOCTYPE html>
<html lang="en">

<head>
    <title>Travlog | Travel top destination of the world</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/styles/main.scss" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
</head>

<body>
    <header class="navigation">
        <div class="navigation__logo">
            <a href="/" class="navigation__logo-link" aria-label="Travlog Homepage">
                <img src="/assets/images/logo.svg" alt="Travlog Logo">
            </a>
        </div>
        <nav class="navigation__menu" aria-label="Main Navigation" id="navMenu">
            <button type="button" class="navigation__close-btn btn btn--primary" id="closeBtn"
                aria-label="Close navigation menu">
                <i class="fas fa-times"></i>
            </button>
            <ul class="navigation__links">
                <li><a class="navigation__link navigation__link--active" href="#" aria-current="page">Home</a>
                </li>
                <li><a class="navigation__link" href="#">Discover</a></li>
                <li><a class="navigation__link" href="#">Special Deals</a></li>
                <li><a class="navigation__link" href="#">Contact</a></li>
            </ul>
        </nav>
        <div class="navigation__actions">
            <button class="btn btn--muted navigation__actions-btn navigation__actions-btn--login">Log In</button>
            <button class="btn btn--primary navigation__actions-btn navigation__actions-btn--signup">Sign Up</button>
        </div>
        <div class="navigation__hamburger">
            <button type="button" class="btn btn--primary navigation__hamburger-btn" id="hamburgerBtn"
                aria-controls="sidebar" aria-expanded="false">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <section class="hero">
        <div class="hero__content">
            <button class="btn btn--muted hero__badge">
                <p class="hero__badge-text"> Explore the world!</p>
                <i class="fas fa-briefcase hero__badge-icon"></i>
            </button>
            <h1 class="hero__title"><span class="hero__text-break"> Travel <span class="hero__title--highlight">top
                        destination</span></span> of the world </h1>
            <p class="hero__description">We always make our customer happy by providing<span class="hero__text-break">  as many choices as possible</span> </p>
            <div class="hero__actions">
                <button type="button" class="btn btn--primary hero__action hero__action--first">Get Started</button>
                <button type="button" class="btn btn--muted hero__action hero__action--second">
                    <i class="fas fa-play-circle hero-play-icon"></i>
                    Watch Demo
                </button>
            </div>
        </div>
        <div class="hero__media">
            <div class="hero__bg">
                <img class="hero__bg-img" src="/assets/images/hero-bg.png" alt="">
            </div>
            <div class="hero__gallery">
                <div class="hero__card hero__card--left">
                    <img class="hero__image" src="/assets/images/hero_1.jpg" alt="" srcset="">
                    <img class="hero__image" src="/assets/images/hero_2.jpg" alt="" srcset="">
                    <div class="hero__icon hero__icon--telegram ">
                        <i class="fas fa-paper-plane"></i>
                    </div>
                </div>
                <div class="hero__card">
                    <img class="hero__image" src="/assets/images/hero_3.jpg" alt="" srcset="">
                    <div class="hero__icon hero__icon--contact">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <div class="hero__tag">
                        <i class="fas fa-map-marker-alt hero__tag-icon" style="color: rgb(255, 212, 59);"></i>
                        <p>Top Places</p>
                    </div>
                </div>
            </div>
        </div>
        <div class="hero__arrows">
            <img class="hero__arrows-img" src="/assets/images/arrows.png" alt="">
        </div>
    </section>

    <script type="module" src="./src/script/index.js"></script>
</body>

</html>
