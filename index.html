<!DOCTYPE html>
<html lang="en">

<head>
    <title>Travlog | Travel top destination of the world</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/css/main.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
</head>

<body>
    <header class="nav">
        <div class="nav__logo">
            <a href="/" aria-label="Travlog Homepage">
                <img src="/assets/images/logo.svg" alt="Travlog Logo">
            </a>
        </div>
        <nav aria-label="Main Navigation">
            <ul class="nav__links">
                <li><a class="active" href="#" aria-current="page">Home</a></li>
                <li><a href="#">Discover</a></li>
                <li><a href="#">Special Deals</a></li>
                <li><a href="#">Contact</a></li>

            </ul>
        </nav>
        <div class="nav__actions" aria-label="User Account Actions">
            <button class="btn btn--muted">Log In</button>
            <button class="btn btn--primary">Sign Up</button>
        </div>
        <div class="nav__hamburger">
            <button type="button" class="btn btn--primary nav__hamburger-btn" id="hamburgerBtn" aria-controls="sidebar">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>
    <script type="module" src="./src/script/index.js"></script>
</body>

</html>
